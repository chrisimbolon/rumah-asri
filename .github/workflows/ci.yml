name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       developindo_test
          POSTGRES_USER:     developindo
          POSTGRES_PASSWORD: developindo_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
      SECRET_KEY:              ci-secret-key-not-for-production
      DEBUG:                   "True"
      DATABASE_URL:            postgres://developindo:developindo_test_pass@localhost:5432/developindo_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements/base.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements/base.txt

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Run tests
        working-directory: backend
        run: python manage.py test apps.core --verbosity=2
